# Complete, standalone config for the same-domain kVp translation task:
# 120 kVp CT -> 80 kVp (or 140 kVp) CT. This file lists every key explicitly (mirroring
# configs/iodine.yaml, the iodine task's config) so the full kVp-task configuration is
# visible in one place, with no implicit inheritance from the other file.
#
# Data layout (nested DE groups):
#   <root>/DE1..DE5/{80kV,120kV,140kV}/<patient 1..10>/<dicom files>
# Point --data-root at the folder that directly contains the DE* folders, e.g.
#   --data-root data\kvp_dataset
#
# Cross-validation is leave-one-DE-group-out: 5 groups -> 5 folds (10 patients per fold).
#
# Usage:
#   dualct cv --config configs/kvp.yaml --data-root data\kvp_dataset
#   :: 120 -> 140 kVp:
#   dualct cv --config configs/kvp.yaml --data-root data\kvp_dataset ^
#       --set data.target_subdir=140kV output.pred_suffix=Synth_140kV
seed: 42

data:
  root: "./"
  input_subdir: "120kV"            # kV folder name inside each DE group
  target_subdir: "80kV"            # set to "140kV" for the 120->140 task
  mask_subdir: "MASK"              # unused (task.mask_source is body_threshold, not external)
  patient_ids: null                # null = auto-discover all patients; or explicit list e.g. ["DE1/1"]
  nested_groups: true              # <root>/<DEgroup>/<kv>/<patient>/ layout (differs from iodine: false)
  cache_dir: null                  # optional PersistentDataset cache; never commit this directory

task:
  mask_source: "body_threshold"    # auto-generate a body mask from the input CT (differs from iodine: "external")
  body_thr_hu: -600                # HU threshold for the body mask

normalize:
  input_hu_min: -1024              # input CT
  input_hu_max: 3071
  target_min: -1024                # same-domain CT->CT: target uses the input's HU range (differs from iodine: 0)
  target_max: 3071                 # (differs from iodine: 200)

model:
  name: "swinunetr"
  feature_size: 48
  use_checkpoint: true
  spatial_dims: 3
  in_channels: 1
  out_channels: 1
  residual: true                   # identity warm-start residual (differs from iodine: false)
  residual_alpha: 1.0
  unet_channels: [16, 32, 64, 128, 256]
  unet_strides: [2, 2, 2, 2]
  unet_num_res_units: 2
  unet_norm: "INSTANCE"
  unet_dropout: 0.0

loss:
  region: "mask"                   # {mask | full} - toggles the spatial region the loss is computed over
  main: "l1"                       # main loss is always L1
  aux: "cdf"                       # {none | cdf} - auxiliary Wasserstein/quantile loss toggle
  lam_cdf: 0.3
  cdf_M: 1024                      # number of quantiles used during training
  cdf_max_voxels: 65536

train:
  roi_size: [64, 128, 128]
  batch_size: 4
  num_epochs: 500
  lr: 2.0e-4
  weight_decay: 1.0e-4
  amp: true
  amp_dtype: "float16"             # {float16 | bfloat16}; autocast dtype, used only on CUDA when amp is true
  num_workers: 0
  validate_every: 20
  num_samples_per_volume: 2        # RandCropByPosNegLabeld num_samples

early_stopping:
  enabled: true
  monitor: "mse_mask"
  patience_checks: 5
  min_delta_relative: 0.001
  min_epochs: 200
  restore_best: true

checkpoint:
  selection: "auto"
  monitor: "auto"

runtime:
  device: "auto"

geometry:
  strict: true
  atol: 0.5                        # mm-scale tolerance for PixelSpacing/ImagePositionPatient
                                    # and unitless tolerance for ImageOrientationPatient

infer:
  sw_batch_size: 4
  sw_overlap: 0.25
  sw_mode: "gaussian"
  eval_M: 256                      # number of quantiles used during evaluation
  outside_fill: "input"            # restore the input CT value outside the body mask (differs from iodine: "zero")

cv:
  n_folds: 5                       # informational only: group_folds derives the real fold count from the data
  fold: 0                          # fold index used by train/predict/eval (0..n_folds-1)
  group_folds: true                # leave-one-DE-group-out (differs from iodine: false)
  shuffle: true                    # unused when group_folds is true
  protocol: "train_val_test"      # 3 DE groups train / 1 validation / 1 test
  val_offset: 1

output:
  ckpt_dir: "./checkpoints"
  pred_dir: "./predictions"
  metrics_dir: "./metrics"
  pred_suffix: "Synth_80kV"        # set to "Synth_140kV" for the 120->140 task (differs from iodine: "SynthIodine")
  save_mask: false                 # enable only after standards-compliant DICOM SEG support
  mask_suffix: "Mask"              # reserved for a future DICOM SEG mask export; unused while save_mask is false
